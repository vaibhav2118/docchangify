<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Counter & Text Analyzer - Free Online Tool | DocChangify</title>
    <meta name="description" content="Count words, characters, sentences, and paragraphs instantly. Uncover reading time and keyword density." />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col antialiased">
    <header class="sticky top-0 z-50 glass dark:glass border-b border-white/20 dark:border-white/5 backdrop-blur-md shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30 group-hover:scale-105 transition-transform"><i class="ph ph-magic-wand text-2xl"></i></div>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">DocChangify</span>
        </a>
        <div class="flex items-center gap-6"><button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors"><i class="ph ph-moon text-xl block dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i></button></div>
      </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full fade-in">
      <!-- Top Navigation -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-blue-600 transition-colors">
          <i class="ph ph-arrow-left text-lg"></i> Back to Tools
        </a>
        <nav class="flex items-center gap-2 text-sm text-slate-400 font-medium">
          <a href="/" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Home</a>
          <i class="ph ph-caret-right text-xs"></i>
          <a href="/#text-tools" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Text Tools</a>
          <i class="ph ph-caret-right text-xs"></i>
          <span class="text-slate-700 dark:text-slate-300">Word Counter</span>
        </nav>
      </div>

      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900 dark:text-white">Word & Character Counter</h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Get real-time word limits, character counts, and reading times as you type.</p>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-xl shadow-blue-500/5 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center text-center">
            <span class="text-blue-500 mb-2"><i class="ph ph-text-t text-2xl"></i></span>
            <span class="text-4xl font-extrabold text-slate-900 dark:text-white mb-1" id="stat-words">0</span>
            <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Words</span>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-xl shadow-rose-500/5 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center text-center">
            <span class="text-rose-500 mb-2"><i class="ph ph-quotes text-2xl"></i></span>
            <span class="text-4xl font-extrabold text-slate-900 dark:text-white mb-1" id="stat-chars">0</span>
            <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Characters</span>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-xl shadow-amber-500/5 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center text-center">
            <span class="text-amber-500 mb-2"><i class="ph ph-paragraph text-2xl"></i></span>
            <span class="text-4xl font-extrabold text-slate-900 dark:text-white mb-1" id="stat-sentences">0</span>
            <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Sentences</span>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-xl shadow-emerald-500/5 border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center text-center">
            <span class="text-emerald-500 mb-2"><i class="ph ph-timer text-2xl"></i></span>
            <span class="text-4xl font-extrabold text-slate-900 dark:text-white mb-1" id="stat-time">0m</span>
            <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Read Time</span>
        </div>
      </div>

      <!-- Editor -->
      <div class="flex flex-col h-[500px] mb-16 bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden relative">
        <div class="bg-slate-100 dark:bg-slate-900 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h3 class="font-bold flex items-center gap-2 text-slate-600 dark:text-slate-300"><i class="ph ph-pencil-simple text-xl"></i> Text Editor</h3>
            <div class="flex flex-wrap items-center gap-2">
                <input type="file" id="file-upload" accept=".txt,.md,.pdf" class="hidden">
                <button id="btn-upload" class="text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1 shadow-sm"><i class="ph ph-upload-simple"></i> Upload</button>
                <div class="w-px h-5 bg-slate-300 dark:bg-slate-600 mx-1"></div>
                <button id="btn-clear" class="text-sm font-semibold text-slate-500 hover:text-red-500 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-slate-200 dark:hover:bg-slate-800"><i class="ph ph-trash"></i> Clear</button>
                <button id="btn-copy" class="text-sm font-semibold text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-slate-200 dark:hover:bg-slate-800"><i class="ph ph-copy"></i> Copy</button>
                <button id="btn-download" class="text-sm font-semibold text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-slate-200 dark:hover:bg-slate-800"><i class="ph ph-download-simple"></i> Download</button>
            </div>
        </div>
        <textarea id="text-input" spellcheck="true" class="w-full h-full p-6 lg:p-10 bg-transparent resize-none focus:outline-none font-sans text-lg leading-relaxed text-slate-700 dark:text-slate-300" placeholder="Start typing, or paste your document here..."></textarea>
      </div>

      <!-- Related Tools -->
      <div class="pt-8 border-t border-slate-200 dark:border-slate-800 mb-16">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-2xl font-bold text-slate-900 dark:text-white">Related Tools</h3>
          <div class="flex gap-2">
            <a href="/base64.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Previous Tool (Base64 Encode)">
              <i class="ph ph-arrow-left text-lg"></i>
            </a>
            <a href="/remove-spaces.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Next Tool (Remove Spaces)">
              <i class="ph ph-arrow-right text-lg"></i>
            </a>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
          <a href="/word-counter.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-article text-xl"></i></div>
            <div class="font-bold text-sm">Word Counter</div>
          </a>
          <a href="/remove-spaces.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-broom text-xl"></i></div>
            <div class="font-bold text-sm">Remove Spaces</div>
          </a>
          <a href="/text-case.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-text-aa text-xl"></i></div>
            <div class="font-bold text-sm">Text Case</div>
          </a>
          <a href="/json-to-csv.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center"><i class="ph ph-brackets-curly text-xl"></i></div>
            <div class="font-bold text-sm">JSON Format</div>
          </a>
        </div>
      </div>
    </main>
    <script type="module" src="/src/tools/word-counter.js"></script>
  </body>
</html>
