<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Editor - Live Preview & Download | DocChangify</title>
    <meta name="description" content="Free online Markdown editor with live preview. Write Markdown and instantly see the rendered output. Download as HTML or copy raw." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/src/main.js"></script>
    <style>
      #editor { font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.7; resize: none; }
      #preview { font-family: 'Inter', sans-serif; line-height: 1.8; }
      #preview h1,#preview h2,#preview h3,#preview h4 { font-weight: 800; margin: 1em 0 0.5em; color: #1e293b; }
      #preview p { margin: 0.75em 0; color: #475569; }
      #preview code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: #6366f1; }
      #preview pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 12px; overflow-x: auto; }
      #preview pre code { background: none; color: inherit; padding: 0; }
      #preview blockquote { border-left: 4px solid #6366f1; padding-left: 16px; color: #64748b; font-style: italic; margin: 1em 0; }
      #preview ul,#preview ol { padding-left: 24px; color: #475569; }
      #preview li { margin: 4px 0; }
      #preview hr { border: none; border-top: 2px solid #e2e8f0; margin: 1.5em 0; }
      #preview a { color: #6366f1; text-decoration: underline; }
      #preview table { width: 100%; border-collapse: collapse; }
      #preview th,#preview td { padding: 8px 12px; border: 1px solid #e2e8f0; }
      #preview th { background: #f1f5f9; font-weight: 700; }
      .dark #preview h1,.dark #preview h2,.dark #preview h3,.dark #preview h4 { color: #e2e8f0; }
      .dark #preview p,.dark #preview ul,.dark #preview ol,.dark #preview li { color: #94a3b8; }
      .dark #preview code { background: #1e293b; color: #a5b4fc; }
      .dark #preview blockquote { border-color: #a5b4fc; color: #94a3b8; }
      .dark #preview th { background: #1e293b; }
      .dark #preview th,.dark #preview td { border-color: #334155; }
    </style>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="min-h-screen flex flex-col antialiased dark:bg-slate-950 dark:text-slate-100" style="background:#f1f5ff;font-family:'Inter',sans-serif;">
    <header class="sticky top-0 z-50 glass dark:bg-slate-900/80 border-b border-white/30 dark:border-slate-800 shadow-sm backdrop-blur-xl">
      <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-[70px]">
        <a href="/" class="flex items-center gap-2.5">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg" style="background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);"><i class="ph ph-magic-wand text-xl"></i></div>
          <span class="text-xl font-extrabold" style="background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">DocChangify</span>
        </a>
        <div class="flex items-center gap-3">
          <button id="btn-clear" class="btn-secondary text-sm px-4 py-2"><i class="ph ph-trash"></i> Clear</button>
          <button id="btn-copy" class="btn-secondary text-sm px-4 py-2"><i class="ph ph-copy"></i> Copy MD</button>
          <button id="btn-download-html" class="btn-primary text-sm px-5 py-2" style="background:linear-gradient(135deg,#6366f1,#a855f7);"><i class="ph ph-download-simple"></i> HTML</button>
          <button id="btn-download-md" class="btn-primary text-sm px-5 py-2" style="background:linear-gradient(135deg,#a855f7,#ec4899);"><i class="ph ph-download-simple"></i> .md</button>
          <a href="/" class="text-sm font-semibold text-slate-500 hover:text-indigo-600 transition-colors">← Back</a>
          <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors"><i class="ph ph-moon text-lg block dark:hidden"></i><i class="ph ph-sun text-lg hidden dark:block text-yellow-400"></i></button>
        </div>
      </div>
    </header>

    <main class="flex-grow max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full fade-in">
      <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-3 text-slate-900 dark:text-white">Markdown Editor</h1>
        <p class="text-lg text-slate-500">Write Markdown on the left — see the live preview on the right. Download as HTML or .md file.</p>
      </div>

      <div class="grid lg:grid-cols-2 gap-5 mb-6">
        <!-- Editor pane -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl overflow-hidden flex flex-col">
          <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-900">
            <span class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2"><i class="ph ph-pencil-simple text-indigo-500"></i> Markdown</span>
            <span id="word-count" class="text-xs text-slate-400 font-medium">0 words</span>
          </div>
          <textarea id="editor"
            class="flex-grow w-full p-5 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 outline-none border-none"
            style="min-height: 70vh;"
            spellcheck="false"
            placeholder="# Hello, DocChangify!&#10;&#10;Write your **Markdown** here...&#10;&#10;- Item 1&#10;- Item 2&#10;&#10;> This is a blockquote&#10;&#10;```&#10;console.log('code block')&#10;```"></textarea>
        </div>

        <!-- Preview pane -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl overflow-hidden flex flex-col">
          <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-900">
            <span class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2"><i class="ph ph-eye text-purple-500"></i> Preview</span>
            <span class="text-xs text-emerald-500 font-bold flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse inline-block"></span>Live</span>
          </div>
          <div id="preview" class="flex-grow p-6 overflow-y-auto" style="min-height: 70vh;"></div>
        </div>
      </div>
    </main>
    <footer class="bg-slate-900 text-slate-400 py-4 text-center text-sm"><p>&copy; 2026 DocChangify | <a href="/" class="hover:text-white">Home</a></p></footer>
    <script type="module" src="/src/tools/markdown-editor.js"></script>
  </body>
</html>
