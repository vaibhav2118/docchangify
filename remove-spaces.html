<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remove Extra Spaces - Free Online Text Cleaning Tool | ConvertEra</title>
    <meta name="description" content="Clean your text by instantly removing multiple spaces, leading/trailing whitespace, and empty lines. 100% free." />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col antialiased">
    <header class="sticky top-0 z-50 glass dark:glass border-b border-white/20 dark:border-white/5 backdrop-blur-md shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
            <i class="ph ph-magic-wand text-2xl"></i>
          </div>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">ConvertEra</span>
        </a>
        <div class="flex items-center gap-6"><button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors"><i class="ph ph-moon text-xl block dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i></button></div>
      </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full fade-in">
      <!-- Top Navigation -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-emerald-600 transition-colors">
          <i class="ph ph-arrow-left text-lg"></i> Back to Tools
        </a>
        <nav class="flex items-center gap-2 text-sm text-slate-400 font-medium">
          <a href="/" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Home</a>
          <i class="ph ph-caret-right text-xs"></i>
          <a href="/#text-tools" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Text Tools</a>
          <i class="ph ph-caret-right text-xs"></i>
          <span class="text-slate-700 dark:text-slate-300">Remove Extra Spaces</span>
        </nav>
      </div>

      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900 dark:text-white">Remove Extra Spaces</h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Format messy text by automatically eliminating double spaces, tabs, and unnecessary line breaks.</p>
      </div>

      <div class="grid md:grid-cols-2 gap-6 h-[500px] mb-16">
        
        <!-- Input -->
        <div class="flex flex-col h-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div class="bg-slate-100 dark:bg-slate-900 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
            <h3 class="font-bold flex items-center gap-2 text-rose-500"><i class="ph ph-text-b text-xl"></i> Messy Text</h3>
            <button id="btn-clear" class="text-sm font-semibold text-slate-500 hover:text-rose-500 transition-colors">Clear</button>
          </div>
          <textarea id="text-input" spellcheck="false" class="w-full h-full p-6 bg-transparent resize-none focus:outline-none font-sans text-lg text-slate-700 dark:text-slate-300 placeholder:text-slate-400" placeholder="Paste your   messy      text here..."></textarea>
        </div>

        <!-- Output -->
        <div class="flex flex-col h-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden relative">
          <div class="bg-slate-100 dark:bg-slate-900 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center z-10">
            <h3 class="font-bold flex items-center gap-2 text-emerald-500"><i class="ph ph-sparkle text-xl"></i> Clean Text</h3>
            <div class="flex items-center gap-2">
                <button id="btn-copy" class="text-sm font-semibold text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-slate-200 dark:hover:bg-slate-800"><i class="ph ph-copy"></i> Copy</button>
                
                <!-- Download Dropdown -->
                <div class="relative">
                  <button id="btn-download-toggle" class="text-sm font-semibold text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-slate-200 dark:hover:bg-slate-800">
                    <i class="ph ph-download-simple"></i> Download <i class="ph ph-caret-down text-xs ml-1"></i>
                  </button>
                  <div id="download-menu" class="hidden absolute right-0 mt-2 w-40 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl overflow-hidden z-50">
                    <button class="dl-opt w-full text-left px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2" data-format="txt"><i class="ph ph-file-text text-lg text-slate-400"></i> Text (.txt)</button>
                    <button class="dl-opt w-full text-left px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2" data-format="pdf"><i class="ph ph-file-pdf text-lg text-rose-400"></i> PDF (.pdf)</button>
                    <button class="dl-opt w-full text-left px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2" data-format="docx"><i class="ph ph-file-doc text-lg text-blue-400"></i> Word (.docx)</button>
                  </div>
                </div>
            </div>
          </div>
          <textarea id="text-output" readonly class="w-full h-full p-6 bg-slate-50 dark:bg-slate-900/50 resize-none focus:outline-none font-sans text-lg text-slate-700 dark:text-slate-300 cursor-text"></textarea>
          
          <div class="absolute bottom-6 right-6">
             <div class="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 px-4 py-2 rounded-xl text-sm font-bold shadow-sm" id="spaces-saved">0 spaces removed</div>
          </div>
        </div>

      </div>

      <!-- Related Tools -->
      <div class="pt-8 border-t border-slate-200 dark:border-slate-800 mb-16">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-2xl font-bold text-slate-900 dark:text-white">Related Tools</h3>
          <div class="flex gap-2">
            <a href="/word-counter.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Previous Tool (Word Counter)">
              <i class="ph ph-arrow-left text-lg"></i>
            </a>
            <a href="/text-case.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Next Tool (Text Case)">
              <i class="ph ph-arrow-right text-lg"></i>
            </a>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
          <a href="/word-counter.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-article text-xl"></i></div>
            <div class="font-bold text-sm">Word Counter</div>
          </a>
          <a href="/remove-spaces.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-broom text-xl"></i></div>
            <div class="font-bold text-sm">Remove Spaces</div>
          </a>
          <a href="/text-case.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-text-aa text-xl"></i></div>
            <div class="font-bold text-sm">Text Case</div>
          </a>
          <a href="/json-to-csv.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center"><i class="ph ph-brackets-curly text-xl"></i></div>
            <div class="font-bold text-sm">JSON Format</div>
          </a>
        </div>
      </div>
    </main>
    <script type="module" src="/src/tools/remove-spaces.js"></script>
  </body>
</html>
