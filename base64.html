<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base64 Encoder & Decoder - Free Online Developer Tool</title>
    <meta name="description" content="Encode to or decode from Base64 instantly in your browser. 100% free and secure developer tool." />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col antialiased">
    <header class="sticky top-0 z-50 glass dark:glass border-b border-white/20 dark:border-white/5 backdrop-blur-md shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30 group-hover:scale-105 transition-transform"><i class="ph ph-magic-wand text-2xl"></i></div>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">ConvertEra</span>
        </a>
        <div class="flex items-center gap-6"><button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors"><i class="ph ph-moon text-xl block dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i></button></div>
      </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full fade-in">
      <!-- Top Navigation -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-indigo-600 transition-colors">
          <i class="ph ph-arrow-left text-lg"></i> Back to Tools
        </a>
        <nav class="flex items-center gap-2 text-sm text-slate-400 font-medium">
          <a href="/" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Home</a>
          <i class="ph ph-caret-right text-xs"></i>
          <a href="/#developer-tools" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Developer Tools</a>
          <i class="ph ph-caret-right text-xs"></i>
          <span class="text-slate-700 dark:text-slate-300">Base64 Encoder</span>
        </nav>
      </div>

      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900 dark:text-white">Base64 Encoder / Decoder</h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Convert plain text into Base64 format, or decode Base64 strings back into human-readable text securely.</p>
      </div>

      <div class="flex flex-col h-[600px] mb-16 bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden relative">
        
        <!-- Toggle Mode -->
        <div class="bg-slate-100 dark:bg-slate-900 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-center items-center gap-4">
           <button id="mode-encode" class="px-6 py-2 rounded-full font-bold transition-colors bg-indigo-600 text-white shadow-md">Encode</button>
           <button id="mode-decode" class="px-6 py-2 rounded-full font-bold transition-colors bg-transparent text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400">Decode</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 h-full">
          <!-- Input -->
          <div class="flex flex-col h-full border-r border-slate-200 dark:border-slate-700">
             <div class="px-6 py-3 border-b border-slate-100 dark:border-slate-700 flex justify-between">
                <span id="input-label" class="font-bold text-slate-500 text-sm uppercase tracking-wide">Plain Text</span>
                <button id="btn-clear" class="text-xs text-slate-400 hover:text-red-500">Clear</button>
             </div>
             <textarea id="input-text" class="w-full h-full p-6 bg-transparent resize-none focus:outline-none font-mono text-sm leading-relaxed text-slate-700 dark:text-slate-300" placeholder="Type or paste text here..."></textarea>
          </div>

          <!-- Output -->
          <div class="flex flex-col h-full bg-slate-50 dark:bg-slate-900/30">
             <div class="px-6 py-3 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                <span id="output-label" class="font-bold text-indigo-500 text-sm uppercase tracking-wide">Base64 String</span>
                <div class="flex gap-3">
                  <button id="btn-copy" class="text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 flex items-center gap-1"><i class="ph ph-copy text-sm"></i> Copy Output</button>
                  <button id="btn-download" class="text-xs font-bold text-emerald-600 dark:text-emerald-400 hover:text-emerald-800 flex items-center gap-1 bg-emerald-50 dark:bg-emerald-900/20 px-3 py-1.5 rounded-lg border border-emerald-200 dark:border-emerald-800"><i class="ph ph-download-simple text-sm"></i> Download</button>
                </div>
             </div>
             <textarea id="output-text" readonly class="w-full h-full p-6 bg-transparent resize-none focus:outline-none font-mono text-sm leading-relaxed text-slate-600 dark:text-slate-400"></textarea>
          </div>
        </div>
        
      </div>

      <!-- Related Tools -->
      <div class="pt-8 border-t border-slate-200 dark:border-slate-800 mb-16">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-2xl font-bold text-slate-900 dark:text-white">Related Tools</h3>
          <div class="flex gap-2">
            <a href="/csv-to-json.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Previous Tool (CSV to JSON)">
              <i class="ph ph-arrow-left text-lg"></i>
            </a>
            <a href="/word-counter.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Next Tool (Word Counter)">
              <i class="ph ph-arrow-right text-lg"></i>
            </a>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
          <a href="/json-to-csv.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center"><i class="ph ph-brackets-curly text-xl"></i></div>
            <div class="font-bold text-sm">JSON Format</div>
          </a>
          <a href="/csv-to-json.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center"><i class="ph ph-table text-xl"></i></div>
            <div class="font-bold text-sm">CSV to JSON</div>
          </a>
          <a href="/base64.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 flex items-center justify-center"><i class="ph ph-code text-xl"></i></div>
            <div class="font-bold text-sm">Base64 Encode</div>
          </a>
          <a href="/word-counter.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-article text-xl"></i></div>
            <div class="font-bold text-sm">Word Counter</div>
          </a>
        </div>
      </div>
    </main>
    <script type="module" src="/src/tools/base64.js"></script>
  </body>
</html>
