<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convert Text Case - Uppercase, Lowercase, Titlecase | ConvertEra</title>
    <meta name="description" content="Change your text between uppercase, lowercase, title case, and sentence case instantly. Free online text formatting tool." />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col antialiased">
    <header class="sticky top-0 z-50 glass dark:glass border-b border-white/20 dark:border-white/5 backdrop-blur-md shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
            <i class="ph ph-magic-wand text-2xl"></i>
          </div>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">ConvertEra</span>
        </a>
        <div class="flex items-center gap-6"><button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors"><i class="ph ph-moon text-xl block dark:hidden"></i><i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i></button></div>
      </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full fade-in">
      <!-- Top Navigation -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-emerald-600 transition-colors">
          <i class="ph ph-arrow-left text-lg"></i> Back to Tools
        </a>
        <nav class="flex items-center gap-2 text-sm text-slate-400 font-medium">
          <a href="/" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Home</a>
          <i class="ph ph-caret-right text-xs"></i>
          <a href="/#text-tools" class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors">Text Tools</a>
          <i class="ph ph-caret-right text-xs"></i>
          <span class="text-slate-700 dark:text-slate-300">Text Case</span>
        </nav>
      </div>

      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900 dark:text-white">Convert Text Case</h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Instantly format your writing into UPPERCASE, lowercase, Title Case, or Sentence case.</p>
      </div>

      <div class="flex flex-col mb-16 bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden relative">
        
        <!-- Controls -->
        <div class="bg-slate-100 dark:bg-slate-900 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex flex-wrap gap-3 justify-center">
            <button id="btn-upper" class="btn-format px-4 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg hover:border-indigo-500 hover:text-indigo-600 dark:hover:border-indigo-400 dark:hover:text-indigo-400 transition-colors font-semibold shadow-sm">UPPERCASE</button>
            <button id="btn-lower" class="btn-format px-4 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg hover:border-indigo-500 hover:text-indigo-600 dark:hover:border-indigo-400 dark:hover:text-indigo-400 transition-colors font-semibold shadow-sm text-sm">lowercase</button>
            <button id="btn-title" class="btn-format px-4 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg hover:border-indigo-500 hover:text-indigo-600 dark:hover:border-indigo-400 dark:hover:text-indigo-400 transition-colors font-semibold shadow-sm">Title Case</button>
            <button id="btn-sentence" class="btn-format px-4 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg hover:border-indigo-500 hover:text-indigo-600 dark:hover:border-indigo-400 dark:hover:text-indigo-400 transition-colors font-semibold shadow-sm">Sentence case</button>
        </div>

        <!-- Editor -->
        <div class="relative h-[400px]">
            <textarea id="text-input" spellcheck="false" class="w-full h-full p-8 bg-transparent resize-none focus:outline-none font-sans text-lg text-slate-700 dark:text-slate-300 placeholder:text-slate-400" placeholder="Type or paste your text here to change its format..."></textarea>
            
            <div class="absolute bottom-6 right-6 flex gap-3 items-center z-10">
                <button id="btn-clear" class="px-4 py-2.5 bg-slate-100 hover:bg-rose-100 text-slate-600 hover:text-rose-600 dark:bg-slate-700 dark:hover:bg-rose-900/30 dark:text-slate-300 dark:hover:text-rose-400 rounded-xl font-bold transition-colors">Clear</button>
                <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button id="btn-copy" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors shadow-lg shadow-indigo-500/20 flex items-center gap-2"><i class="ph ph-copy"></i> Copy</button>
                
                <!-- Download Dropdown -->
                <div class="relative">
                  <button id="btn-download-toggle" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold transition-colors shadow-lg shadow-emerald-500/20 flex items-center gap-2">
                    <i class="ph ph-download-simple"></i> Download <i class="ph ph-caret-down text-xs ml-1"></i>
                  </button>
                  <div id="download-menu" class="hidden absolute right-0 bottom-full mb-2 w-40 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl overflow-hidden z-50">
                    <button class="dl-opt w-full text-left px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2" data-format="txt"><i class="ph ph-file-text text-lg text-slate-400"></i> Text (.txt)</button>
                    <button class="dl-opt w-full text-left px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2" data-format="pdf"><i class="ph ph-file-pdf text-lg text-rose-400"></i> PDF (.pdf)</button>
                    <button class="dl-opt w-full text-left px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2" data-format="docx"><i class="ph ph-file-doc text-lg text-blue-400"></i> Word (.docx)</button>
                  </div>
                </div>
            </div>
        </div>

      </div>

      <!-- Related Tools -->
      <div class="pt-8 border-t border-slate-200 dark:border-slate-800 mb-16 mt-16">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-2xl font-bold text-slate-900 dark:text-white">Related Tools</h3>
          <div class="flex gap-2">
            <a href="/remove-spaces.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Previous Tool (Remove Spaces)">
              <i class="ph ph-arrow-left text-lg"></i>
            </a>
            <a href="/png-to-jpg.html" class="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors tooltip" title="Next Tool (PNG to JPG)">
              <i class="ph ph-arrow-right text-lg"></i>
            </a>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
          <a href="/word-counter.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-article text-xl"></i></div>
            <div class="font-bold text-sm">Word Counter</div>
          </a>
          <a href="/remove-spaces.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-broom text-xl"></i></div>
            <div class="font-bold text-sm">Remove Spaces</div>
          </a>
          <a href="/text-case.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 flex items-center justify-center"><i class="ph ph-text-aa text-xl"></i></div>
            <div class="font-bold text-sm">Text Case</div>
          </a>
          <a href="/json-to-csv.html" class="saas-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 flex items-center justify-center"><i class="ph ph-brackets-curly text-xl"></i></div>
            <div class="font-bold text-sm">JSON Format</div>
          </a>
        </div>
      </div>
    </main>
    <script type="module" src="/src/tools/text-case.js"></script>
  </body>
</html>
